  <!-- HERO -->
  <main class="hero">
    <div class="overlay"></div>

    <a class="back-btn" href="ps.html">← Digital Art</a>

      <a class="project project-5" href="#" onclick="openImage(this.querySelector('img')); return false;">
        <img src="digital_art/digital_art_5.jpg" alt="Digital Art 5">
        <span>Digital Art 5</span>
      </a>

      <a class="project project-6" href="#" onclick="openImage(this.querySelector('img')); return false;">

  </main>

  <!-- IMAGE POPUP MODAL -->
  <div class="img-modal" id="imgModal" onclick="closeImage()">
    <div class="img-modal-window" onclick="event.stopPropagation()">

      <!-- TITLEBAR -->
      <div class="img-titlebar">
        <div class="img-dots">
          <span class="dot dot-red" onclick="closeImage()"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <span class="img-title-text" id="imgModalTitle"></span>
      </div>

      <!-- IMAGE -->
      <div class="img-body">
        <img id="imgModalPhoto" src="" alt="">
      </div>

    </div>
  </div>

  <!-- DOCK -->
  <div class="dock-wrapper">
    <div class="dock">
<a class="dock-item safari" href="safari.html">
  <img src="dock_safari.png">
  <span class="dock-label"> გამომყევი </span>
</a>

<a class="dock-item whatsapp" href="whatsapp.html">
  <img src="dock_whatsapp.png">
  <span class="dock-label">WhatsApp</span>
</a>

<a class="dock-item ps active" href="ps.html">
  <img src="dock_ps.png">
  <span class="dock-label">Photoshop</span>
</a>

<a class="dock-item ai" href="ai.html">
  <img src="dock_ai.png">
  <span class="dock-label">Illustrator</span>
</a>

<a class="dock-item id" href="id.html">

</a>

<a class="dock-item figma" href="figma.html">

</a>

<a class="dock-item notes" href="notes.html">
  <img src="dock_notes.png">
  <span class="dock-label">ჩემს შესახებ</span>
</a>

    </div>
  </div>

  <script>

    // ── SEARCH ──────────────────────────────────────
    const searchToggle = document.getElementById("search-toggle");
    const searchInput  = document.getElementById("search-input");
    searchToggle.addEventListener("click", () => {
      searchInput.classList.toggle("active");
      if (searchInput.classList.contains("active")) searchInput.focus();
    });

    // ── NOTIFICATION ─────────────────────────────────
    const notif = document.getElementById("notification");

    setTimeout(() => {
      notif.classList.add("show");
    }, 1500);

    setTimeout(() => {
      notif.classList.add("hide");
      setTimeout(() => notif.classList.remove("show", "hide"), 400);
    }, 6000);

    function openInstagram() {
      window.open("https://www.instagram.com/marigogoladze1", "_blank");
    }

    // ── IMAGE MODAL ──────────────────────────────────
    // .src ელემენტიდან პირდაპირ იკითხება, რომ path-ი არასდროს გატყდეს
    function openImage(imgEl) {
      const modal    = document.getElementById("imgModal");
      const modalImg = document.getElementById("imgModalPhoto");
      const title    = document.getElementById("imgModalTitle");

      modalImg.src = imgEl.src;
      modalImg.alt = imgEl.alt;
      title.textContent = imgEl.alt;

      modal.classList.add("open");
      document.addEventListener("keydown", onEscImg);
    }

    function closeImage() {
      const modal    = document.getElementById("imgModal");
      const modalImg = document.getElementById("imgModalPhoto");
      modal.classList.remove("open");
      modalImg.src = "";
      document.removeEventListener("keydown", onEscImg);
    }

    function onEscImg(e) {
      if (e.key === "Escape") closeImage();
    }

  </script>

</body>
</html>
