    <!-- PHOTO POPUP -->
    <div class="photo-modal" id="photoModal" onclick="closePhoto()">
      <div class="photo-modal-window" onclick="event.stopPropagation()">
        <div class="photo-modal-titlebar">
          <div class="photo-modal-dots">
            <span class="dot dot-red" onclick="closePhoto()"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <span class="photo-modal-title" id="photoModalTitle"></span>
        </div>
        <div class="photo-modal-body">
          <img id="photoModalImg" src="" alt="">
        </div>
      </div>
    </div>

  </main>

  <!-- DOCK -->

    <div class="dock">
<a class="dock-item safari " href="safari.html">

  <span class="dock-label">ჩემს შესახებ</span>

    </div>
  </div>

  <!-- SCRIPTS -->
  <script>
    const searchToggle = document.getElementById("search-toggle");
    const searchInput = document.getElementById("search-input");

    searchToggle.addEventListener("click", () => {
      searchInput.classList.toggle("active");
      if (searchInput.classList.contains("active")) searchInput.focus();
    });

    function openPhoto(src, name) {
      const modal = document.getElementById("photoModal");
      const img   = document.getElementById("photoModalImg");
      const title = document.getElementById("photoModalTitle");
      img.src   = src;
      title.textContent = name;
      modal.classList.add("open");
      document.addEventListener("keydown", onEsc);
    }

    function closePhoto() {
      const modal = document.getElementById("photoModal");
      modal.classList.remove("open");
      document.removeEventListener("keydown", onEsc);
    }

    function onEsc(e) {
      if (e.key === "Escape") closePhoto();
    }
  </script>

</body>
</html>
