  <!-- SHARED SVG GRADIENTS FOR THE FOLDER ICONS -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">

  </svg>

  <!-- TOPBAR -->

      <img src="./bbbbbbb 1.png" alt="">
    </a>
    <div class="top-icons">

        <img src="./Untitled-1 1.png" alt="">
      </div>
      <div class="top-icon">
        <img src="./Group 4.png" alt="">
      </div>
      <div class="search-container">
        <div class="top-icon" id="search-toggle">
          <img src="./iconamoon_search.png" alt="">
        </div>
        <input type="text" id="search-input" placeholder="Search...">
      </div>
    </div>
  </header>

  <!-- NOTIFICATION (Instagram) -->
  <div class="notification" id="notification" onclick="openInstagram()">

</div>

  </div>

  <!-- HERO -->

    <div class="overlay"></div>

    <!-- FOLDERS -->

      <a class="folder-item" href="ps-digital-art.html">

          <path d="M2 27 C2 23.7 4.7 21 8 21 H92 C95.3 21 98 23.7 98 27 V68 C98 71.3 95.3 74 92 74 H8 C4.7 74 2 71.3 2 68 Z" fill="url(#folderFront)"/>
        </svg>

          <path d="M2 27 C2 23.7 4.7 21 8 21 H92 C95.3 21 98 23.7 98 27 V68 C98 71.3 95.3 74 92 74 H8 C4.7 74 2 71.3 2 68 Z" fill="url(#folderFront)"/>
        </svg>
        <span>Graphic Design</span>
      </a>

    </div>

  </main>

  <!-- DOCK -->

<a class="dock-item safari" href="safari.html">

  <script>

    // ── SEARCH ──────────────────────────────────────
    const searchToggle = document.getElementById("search-toggle");
    const searchInput  = document.getElementById("search-input");
    searchToggle.addEventListener("click", () => {
      searchInput.classList.toggle("active");
      if (searchInput.classList.contains("active")) searchInput.focus();
    });

    // ── NOTIFICATION ─────────────────────────────────
    const notif = document.getElementById("notification");

    setTimeout(() => {
      notif.classList.add("show");
    }, 1500);

    setTimeout(() => {
      notif.classList.add("hide");
      setTimeout(() => notif.classList.remove("show", "hide"), 400);
    }, 6000);

    function openInstagram() {
      window.open("https://www.instagram.com/marigogoladze1", "_blank");
    }

  </script>
